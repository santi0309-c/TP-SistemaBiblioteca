<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Miembros del Grupo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.header{text-align:center;padding:60px 24px 40px}
.header h1{
  font-family:'Lora',serif;font-size:clamp(28px,6vw,44px);font-weight:600;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;
}
.header p{color:var(--text-muted);font-size:15px}

/* NAV BAR */
.nav-bar{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 20px 24px;gap:12px;flex-wrap:wrap}
.nav-user{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:14px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(124,159,255,0.15);border:1px solid rgba(124,159,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent);overflow:hidden}
.nav-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.nav-links{display:flex;gap:8px;flex-wrap:wrap}
.nav-link{padding:8px 16px;border-radius:50px;background:rgba(124,159,255,0.08);border:1px solid rgba(124,159,255,0.15);color:var(--accent);text-decoration:none;font-size:13px;font-weight:500;transition:all 0.2s;cursor:pointer}
.nav-link:hover{background:rgba(124,159,255,0.18)}
.nav-link.active{background:rgba(124,159,255,0.2);border-color:rgba(124,159,255,0.4)}

/* BUSCADOR */
.search-wrapper{max-width:480px;margin:0 auto 40px;padding:0 20px;position:sticky;top:16px;z-index:10}
.search-wrapper input{width:100%;padding:16px 22px 16px 48px;border-radius:50px;border:1px solid var(--border);background:rgba(8,15,30,0.85);backdrop-filter:blur(20px);color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.25s;min-height:52px}
.search-wrapper input:focus{border-color:var(--accent);background:rgba(8,15,30,0.95)}
.search-icon{position:absolute;left:38px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}

/* CONTADOR */
.contador{text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:24px}
.contador span{color:var(--accent);font-weight:500}

/* GRID */
.container{max-width:1100px;margin:auto;padding:0 20px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 20px 24px;text-align:center;transition:all 0.35s cubic-bezier(.2,.8,.2,1);animation:fadeUp 0.4s ease both;cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--avatar-color,linear-gradient(90deg,var(--accent),var(--accent2)));opacity:0;transition:opacity 0.3s}
.card:hover{transform:translateY(-8px);border-color:var(--border-hover);box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.card:hover::before{opacity:1}
.card:active{transform:scale(0.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.avatar{width:90px;height:90px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:600;color:rgba(255,255,255,0.85);background:#1a2235;box-shadow:6px 6px 14px rgba(0,0,0,0.5),-4px -4px 10px rgba(255,255,255,0.04),inset 2px 2px 5px rgba(255,255,255,0.05),inset -3px -3px 7px rgba(0,0,0,0.4);transition:all 0.35s ease;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card:hover .avatar{transform:scale(1.06)}
.card h3{font-weight:500;font-size:17px;margin-bottom:10px;color:var(--text)}
.motivos-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:50px;margin-bottom:16px;font-weight:500}
.badge-con{background:rgba(78,204,163,0.12);border:1px solid rgba(78,204,163,0.2);color:#4ecca3}
.badge-sin{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:50px;background:rgba(124,159,255,0.12);border:1px solid rgba(124,159,255,0.2);color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s;min-height:40px;width:100%}
.btn:hover{background:rgba(124,159,255,0.2)}

/* SKELETON */
.skeleton{background:rgba(255,255,255,0.05);border-radius:var(--radius);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}

/* ADMIN PANEL */
.admin-panel{max-width:1100px;margin:0 auto 32px;padding:0 20px;display:none}
.admin-panel.visible{display:block}
.admin-card{background:rgba(240,192,96,0.05);border:1px solid rgba(240,192,96,0.15);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.admin-card h3{font-size:14px;font-weight:600;color:var(--gold);margin-bottom:4px}
.admin-card p{font-size:13px;color:var(--text-muted)}
.admin-inputs{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.admin-inputs input{flex:1;min-width:140px;padding:10px 16px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;min-height:40px}
.admin-inputs input:focus{border-color:var(--gold)}
.btn-invitar{padding:10px 20px;border-radius:50px;border:1px solid rgba(240,192,96,0.25);background:rgba(240,192,96,0.15);color:var(--gold);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;min-height:40px}
.btn-invitar:hover{background:rgba(240,192,96,0.25)}
</style>
</head>
<body>
<div class="content">
  <div class="header">
    <h1>Miembros del Grupo</h1>
    <p>Tocá una persona para ver sus motivos de oración</p>
  </div>

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">?</div>
      <span id="navNombre">Cargando...</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="home.html">🏠 Home</a>
      <a class="nav-link active" href="personas.html">👥 Miembros</a>
      <a class="nav-link" id="navTodos" href="todos.html" style="display:none">🙏 Todos</a>
      <a class="nav-link" href="seguimiento.html">📅 Seguimiento</a>
      <a class="nav-link" href="mi-perfil.html">👤 Mi perfil</a>
      <a class="nav-link" onclick="cerrarSesion()">Salir</a>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-card">
      <div>
        <h3>✉️ Invitar miembro</h3>
        <p>Enviá un link de activación por email</p>
      </div>
      <div class="admin-inputs">
        <input type="text" id="invNombre" placeholder="Nombre">
        <input type="email" id="invEmail" placeholder="Email">
        <button class="btn-invitar" onclick="invitar()">Invitar →</button>
      </div>
    </div>
  </div>

  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="search" id="buscador" placeholder="Buscar persona..." autocomplete="off">
  </div>

  <div class="container">
    <div class="contador">Mostrando <span id="countNum">0</span> miembros</div>
    <div class="grid" id="gridPerfiles"></div>
  </div>

  <div class="footer">© 2026 Grupo de Oración · Comunidad Privada</div>
</div>

<script src="api.js"></script>
<script>
requireAuth();

const colores = [
  "linear-gradient(135deg,#7c9fff,#a78bfa)","linear-gradient(135deg,#f472b6,#fb923c)",
  "linear-gradient(135deg,#34d399,#059669)","linear-gradient(135deg,#fb923c,#f59e0b)",
  "linear-gradient(135deg,#a78bfa,#ec4899)","linear-gradient(135deg,#38bdf8,#0ea5e9)",
  "linear-gradient(135deg,#4ade80,#22c55e)","linear-gradient(135deg,#f87171,#ef4444)",
  "linear-gradient(135deg,#fbbf24,#f59e0b)","linear-gradient(135deg,#c084fc,#a855f7)",
  "linear-gradient(135deg,#67e8f9,#06b6d4)","linear-gradient(135deg,#86efac,#4ade80)",
  "linear-gradient(135deg,#fca5a5,#f87171)","linear-gradient(135deg,#fdba74,#fb923c)",
  "linear-gradient(135deg,#a5b4fc,#818cf8)"
];

let todasLasPersonas = [];

(async () => {
  try {
    const perfil = await usuarioApi.perfil();
    const av = document.getElementById("navAvatar");
    if (perfil.foto_url) {
      av.innerHTML = `<img src="${perfil.foto_url}" alt="${perfil.nombre}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      av.textContent = perfil.nombre.charAt(0).toUpperCase();
    }
    document.getElementById("navNombre").textContent = perfil.nombre;

    if (perfil.rol === "admin") {
      document.getElementById("adminPanel").classList.add("visible");
      document.getElementById("navTodos").style.removeProperty("display");
    }
  } catch(e) { console.error(e); }

  await cargarPersonas();
})();

async function cargarPersonas() {
  const grid = document.getElementById("gridPerfiles");
  grid.innerHTML = Array(6).fill(0).map(() =>
    `<div class="skeleton" style="height:220px"></div>`
  ).join("");

  try {
    todasLasPersonas = await personas.listar();
    renderCards(todasLasPersonas);
  } catch(e) {
    grid.innerHTML = `<p style="color:var(--text-muted);text-align:center;grid-column:1/-1">Error al cargar: ${e.message}</p>`;
  }
}

function renderCards(lista) {
  const grid = document.getElementById("gridPerfiles");
  document.getElementById("countNum").textContent = lista.length;

  if (!lista.length) {
    grid.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-muted);grid-column:1/-1"><div style="font-size:40px">🔍</div><p>No encontramos a nadie con ese nombre</p></div>`;
    return;
  }

  grid.innerHTML = lista.map((p, i) => {
    const tieneMotivos = parseInt(p.motivos_activos) > 0;
    // Usar data-src para evitar problemas de escape en onerror
    const avatarHTML = p.foto_url
      ? `<div class="avatar" id="av-${p.id}"><img src="${p.foto_url}" alt="" data-inicial="${p.nombre.charAt(0)}" onload="this.style.opacity=1" onerror="this.parentElement.textContent=this.dataset.inicial" style="width:100%;height:100%;object-fit:cover;border-radius:50%;opacity:0;transition:opacity 0.3s"></div>`
      : `<div class="avatar">${p.nombre.charAt(0)}</div>`;

    return `
      <div class="card" style="animation-delay:${i * 0.05}s;--avatar-color:${colores[i % colores.length]}">
        ${avatarHTML}
        <h3>${p.nombre}</h3>
        <div class="motivos-badge ${tieneMotivos ? 'badge-con' : 'badge-sin'}">
          ${tieneMotivos ? `✓ ${p.motivos_activos} motivo${p.motivos_activos > 1 ? 's' : ''}` : 'Sin motivos aún'}
        </div>
        <a class="btn" href="perfil.html?id=${p.id}&nombre=${encodeURIComponent(p.nombre)}">Ver motivos</a>
      </div>
    `;
  }).join("");
}

document.getElementById("buscador").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const filtradas = todasLasPersonas.filter(p =>
    p.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(q)
  );
  renderCards(filtradas);
});

async function invitar() {
  const nombre = document.getElementById("invNombre").value.trim();
  const email  = document.getElementById("invEmail").value.trim();
  if (!nombre || !email) { alert("Completá nombre y email"); return; }
  try {
    const res = await auth.invitar(email, nombre);
    alert(res.mensaje);
    document.getElementById("invNombre").value = "";
    document.getElementById("invEmail").value  = "";
    await cargarPersonas();
  } catch(e) { alert("Error: " + e.message); }
}
</script>
</body>
</html>
