<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Iniciar sesión · Grupo de Oración</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.login-card{
  width:100%;
  max-width:400px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:40px 32px;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.login-icon{
  font-size:40px;
  text-align:center;
  margin-bottom:20px;
}
.login-title{
  font-family:'Lora',serif;
  font-size:26px;
  font-weight:600;
  text-align:center;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.login-sub{
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
  margin-bottom:32px;
}
.campo{margin-bottom:16px}
.campo label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text-muted);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.campo input{
  width:100%;
  padding:14px 18px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text);
  font-size:16px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:all 0.25s;
  min-height:50px;
}
.campo input:focus{
  border-color:var(--accent);
  background:rgba(124,159,255,0.08);
}
.btn-login{
  width:100%;
  margin-top:8px;
}
.error-msg{
  color:#ff6464;
  font-size:14px;
  text-align:center;
  margin-top:16px;
  display:none;
}
.spinner{
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  vertical-align:middle;
  margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="content login-wrap">
  <div class="login-card">
    <div class="login-icon">🙏</div>
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Grupo de Oración · Comunidad privada</p>

    <div class="campo">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="primary-btn btn-login" id="btnLogin" onclick="handleLogin()">
      Ingresar
    </button>

    <p class="error-msg" id="errorMsg"></p>
  </div>
</div>

<script src="api.js"></script>
<script>
requireGuest();

document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") handleLogin();
});

async function handleLogin() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn      = document.getElementById("btnLogin");
  const err      = document.getElementById("errorMsg");

  if (!email || !password) {
    mostrarError("Completá todos los campos");
    return;
  }

  btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  btn.disabled = true;
  err.style.display = "none";

  try {
    const data = await auth.login(email, password);
    guardarSesion(data.token, data.usuario);
    window.location.href = "home.html";
  } catch (e) {
    mostrarError(e.message);
    btn.innerHTML = "Ingresar";
    btn.disabled = false;
  }
}

function mostrarError(msg) {
  const err = document.getElementById("errorMsg");
  err.textContent = msg;
  err.style.display = "block";
}
</script>
</body>
</html>
