<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Activar cuenta · Grupo de Oración</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{
  width:100%;max-width:400px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:40px 32px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.icono{font-size:40px;text-align:center;margin-bottom:20px}
.titulo{
  font-family:'Lora',serif;font-size:24px;font-weight:600;
  text-align:center;margin-bottom:8px;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:28px}
.campo{margin-bottom:16px}
.campo label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.campo input{
  width:100%;padding:14px 18px;border-radius:50px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);
  color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;
  outline:none;transition:all 0.25s;min-height:50px;
}
.campo input:focus{border-color:var(--accent);background:rgba(124,159,255,0.08)}
.btn-full{width:100%;margin-top:8px}
.msg{font-size:14px;text-align:center;margin-top:16px;display:none}
.msg.error{color:#ff6464}
.msg.ok{color:var(--success)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="content wrap">
  <div class="card">
    <div class="icono">✉️</div>
    <h1 class="titulo">Activá tu cuenta</h1>
    <p class="sub" id="saludo">Elegí una contraseña para ingresar al grupo</p>

    <div id="formWrap">
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <div class="campo">
        <label>Repetir contraseña</label>
        <input type="password" id="pass2" placeholder="Repetí la contraseña" autocomplete="new-password">
      </div>
      <button class="primary-btn btn-full" id="btn" onclick="activar()">
        Activar cuenta
      </button>
    </div>

    <p class="msg" id="msg"></p>
  </div>
</div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get("token");

if (!token) {
  document.getElementById("formWrap").style.display = "none";
  mostrar("Link inválido. Pedile al admin que te reenvíe la invitación.", "error");
}

async function activar() {
  const pass1 = document.getElementById("pass1").value;
  const pass2 = document.getElementById("pass2").value;
  const btn   = document.getElementById("btn");

  if (pass1.length < 8) { mostrar("La contraseña debe tener al menos 8 caracteres", "error"); return; }
  if (pass1 !== pass2)  { mostrar("Las contraseñas no coinciden", "error"); return; }

  btn.innerHTML = '<span class="spinner"></span>Activando...';
  btn.disabled = true;

  try {
    const data = await auth.activar(token, pass1);
    guardarSesion(data.token, data.usuario);
    mostrar("¡Cuenta activada! Redirigiendo...", "ok");
    setTimeout(() => window.location.href = "personas.html", 1500);
  } catch (e) {
    mostrar(e.message, "error");
    btn.innerHTML = "Activar cuenta";
    btn.disabled = false;
  }
}

function mostrar(txt, tipo) {
  const el = document.getElementById("msg");
  el.textContent = txt;
  el.className   = "msg " + tipo;
  el.style.display = "block";
}
</script>
</body>
</html>
