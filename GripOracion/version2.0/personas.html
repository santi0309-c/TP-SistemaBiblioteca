<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Miembros del Grupo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080f1e;
  --bg2:#0e1829;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.18);
  --text:#e8eaf0;
  --text-muted:rgba(232,234,240,0.5);
  --accent:#7c9fff;
  --accent2:#b98fff;
  --radius:20px;
  --radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(124,159,255,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%,rgba(185,143,255,0.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
.content{position:relative;z-index:1}

/* HEADER */
.header{
  text-align:center;
  padding:60px 24px 40px;
}
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--text-muted);
  text-decoration:none;
  font-size:14px;
  margin-bottom:32px;
  padding:10px 18px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--card);
  transition:all 0.2s;
  min-height:44px;
}
.back-btn:hover{color:var(--text);border-color:var(--border-hover)}
.header h1{
  font-family:'Lora',serif;
  font-size:clamp(28px,6vw,44px);
  font-weight:600;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}
.header p{color:var(--text-muted);font-size:15px}

/* BUSCADOR */
.search-wrapper{
  max-width:480px;
  margin:0 auto 40px;
  padding:0 20px;
  position:sticky;
  top:16px;
  z-index:10;
}
.search-wrapper input{
  width:100%;
  padding:16px 22px 16px 48px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(8,15,30,0.85);
  backdrop-filter:blur(20px);
  color:var(--text);
  font-size:16px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:all 0.25s;
  min-height:52px;
}
.search-wrapper input:focus{
  border-color:var(--accent);
  background:rgba(8,15,30,0.95);
}
.search-wrapper input::placeholder{color:var(--text-muted)}
.search-icon{
  position:absolute;
  left:38px;top:50%;
  transform:translateY(-50%);
  font-size:18px;
  pointer-events:none;
}

/* CONTADOR */
.contador{
  text-align:center;
  font-size:13px;
  color:var(--text-muted);
  margin-bottom:24px;
}
.contador span{color:var(--accent);font-weight:500}

/* GRID */
.container{max-width:1100px;margin:auto;padding:0 20px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px 20px 24px;
  text-align:center;
  transition:all 0.35s cubic-bezier(.2,.8,.2,1);
  animation:fadeUp 0.4s ease both;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:var(--avatar-color,linear-gradient(90deg,var(--accent),var(--accent2)));
  opacity:0;
  transition:opacity 0.3s;
}
.card:hover{
  transform:translateY(-8px);
  border-color:var(--border-hover);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
.card:hover::before{opacity:1}
.card:active{transform:scale(0.98)}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* AVATAR */
.avatar{
  width:90px;height:90px;
  border-radius:50%;
  margin:0 auto 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:600;
  color:rgba(255,255,255,0.85);
  background:#1a2235;
  position:relative;
  box-shadow:
    6px 6px 14px rgba(0,0,0,0.5),
    -4px -4px 10px rgba(255,255,255,0.04),
    inset 2px 2px 5px rgba(255,255,255,0.05),
    inset -3px -3px 7px rgba(0,0,0,0.4);
  transition:all 0.35s ease;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card:hover .avatar{
  transform:scale(1.06);
  box-shadow:
    8px 8px 18px rgba(0,0,0,0.6),
    -4px -4px 10px rgba(255,255,255,0.05),
    inset 2px 2px 5px rgba(255,255,255,0.06),
    inset -3px -3px 7px rgba(0,0,0,0.45);
}

/* NOMBRE */
.card h3{
  font-weight:500;
  font-size:17px;
  margin-bottom:10px;
  color:var(--text);
}

/* BADGE DE MOTIVOS */
.motivos-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  padding:5px 12px;
  border-radius:50px;
  margin-bottom:16px;
  font-weight:500;
}
.badge-con{
  background:rgba(78,204,163,0.12);
  border:1px solid rgba(78,204,163,0.2);
  color:#4ecca3;
}
.badge-sin{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text-muted);
}

/* BTN */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 20px;
  border-radius:50px;
  background:rgba(124,159,255,0.12);
  border:1px solid rgba(124,159,255,0.2);
  color:var(--accent);
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  transition:all 0.2s;
  min-height:40px;
  width:100%;
}
.btn:hover{background:rgba(124,159,255,0.2)}

/* VACÍO */
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
  display:none;
}
.empty p{font-size:16px;margin-top:10px}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:13px;
  color:var(--text-muted);
  border-top:1px solid var(--border);
}
</style>
</head>
<body>

<div class="content">
  <div class="header">
    <a href="index.html" class="back-btn">← Volver al inicio</a>
    <h1>Miembros del Grupo</h1>
    <p>Tocá una persona para ver sus motivos de oración</p>
  </div>

  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="buscador" placeholder="Buscar persona..." autocomplete="off" autocorrect="off">
  </div>

  <div class="container">
    <div class="contador">Mostrando <span id="countNum">0</span> miembros</div>
    <div class="grid" id="gridPerfiles"></div>
    <div class="empty" id="empty">
      <div style="font-size:40px">🔍</div>
      <p>No encontramos a nadie con ese nombre</p>
    </div>
  </div>

  <div class="footer">© 2026 Grupo de Oración · Comunidad Privada</div>
</div>

<script>
const personas = [
  {nombre:"Juan",    foto:"fotos/juan.png"},
  {nombre:"María",   foto:"imagenes/maria.jpg"},
  {nombre:"Santy",   foto:"imagenes/santy.jpg"},
  {nombre:"Lucas",   foto:""},
  {nombre:"Valentina",foto:""},
  {nombre:"Tomás",   foto:""},
  {nombre:"Sofía",   foto:""},
  {nombre:"Mateo",   foto:""},
  {nombre:"Camila",  foto:""},
  {nombre:"Agustín", foto:""},
  {nombre:"Martina", foto:""},
  {nombre:"Franco",  foto:""},
  {nombre:"Julieta", foto:""},
  {nombre:"Nicolás", foto:""},
  {nombre:"Micaela", foto:""}
];

/* Personas con motivos cargados en perfil.html */
const conMotivos = ["Juan","María","Santy"];

/* Colores únicos por persona */
const colores = [
  "linear-gradient(135deg,#7c9fff,#a78bfa)",
  "linear-gradient(135deg,#f472b6,#fb923c)",
  "linear-gradient(135deg,#34d399,#059669)",
  "linear-gradient(135deg,#fb923c,#f59e0b)",
  "linear-gradient(135deg,#a78bfa,#ec4899)",
  "linear-gradient(135deg,#38bdf8,#0ea5e9)",
  "linear-gradient(135deg,#4ade80,#22c55e)",
  "linear-gradient(135deg,#f87171,#ef4444)",
  "linear-gradient(135deg,#fbbf24,#f59e0b)",
  "linear-gradient(135deg,#c084fc,#a855f7)",
  "linear-gradient(135deg,#67e8f9,#06b6d4)",
  "linear-gradient(135deg,#86efac,#4ade80)",
  "linear-gradient(135deg,#fca5a5,#f87171)",
  "linear-gradient(135deg,#fdba74,#fb923c)",
  "linear-gradient(135deg,#a5b4fc,#818cf8)"
];

const grid = document.getElementById("gridPerfiles");
const countEl = document.getElementById("countNum");

function crearCards(lista){
  grid.innerHTML="";
  lista.forEach((persona,i)=>{
    const tieneMotivos = conMotivos.includes(persona.nombre);
    const card = document.createElement("div");
    card.className="card";
    card.style.animationDelay=(i*0.05)+"s";

    let avatarHTML;
    if(persona.foto){
      avatarHTML=`<div class="avatar"><img src="${persona.foto}" alt="${persona.nombre}" onerror="this.parentElement.innerHTML='${persona.nombre.charAt(0)}'"></div>`;
    } else {
      avatarHTML=`<div class="avatar">${persona.nombre.charAt(0)}</div>`;
    }

    card.innerHTML=`
      ${avatarHTML}
      <h3>${persona.nombre}</h3>
      <div class="motivos-badge ${tieneMotivos?'badge-con':'badge-sin'}">
        ${tieneMotivos?'✓ Con motivos':'Sin motivos aún'}
      </div>
      <a class="btn" href="perfil.html?nombre=${encodeURIComponent(persona.nombre)}">Ver motivos</a>
    `;

    grid.appendChild(card);
  });
  countEl.textContent=lista.length;
  document.getElementById("empty").style.display=lista.length===0?"block":"none";
}

crearCards(personas);

document.getElementById("buscador").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const filtradas=personas.filter(p=>
    p.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(q)
  );
  crearCards(filtradas);
});
</script>
</body>
</html>
