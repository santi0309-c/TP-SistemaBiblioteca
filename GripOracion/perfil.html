<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motivos de Oración</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:60px 20px;
    color:#1e293b;
}

/* CONTENEDOR PRINCIPAL */

.wrapper{
    width:100%;
    max-width:850px;
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    padding:50px 40px;
    border-radius:28px 28px 0 0;
    color:white;
    box-shadow:0 30px 60px rgba(0,0,0,0.4);
}

.header h2{
    font-size:32px;
    font-weight:700;
}

/* CARD PRINCIPAL */

.card{
    background:white;
    padding:50px 40px;
    border-radius:0 0 28px 28px;
    box-shadow:0 40px 80px rgba(0,0,0,0.35);
}

/* LISTA */

.lista{
    list-style:none;
}

.lista li{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    padding:20px 25px;
    border-radius:18px;
    margin-bottom:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:all 0.25s ease;
}

.lista li:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

/* TEXTO */

.motivo-texto{
    font-size:16px;
    font-weight:500;
    text-align: justify;
    line-height:1.6;
    flex:1;
    margin-right:20px;
}

/* BADGES */

.badge{
    font-size:13px;
    padding:6px 14px;
    border-radius:30px;
    font-weight:600;
}

.badge.activo{
    background:#dcfce7;
    color:#166534;
}

.badge.oracion{
    background:#dbeafe;
    color:#1e40af;
}

.badge.constante{
    background:#fef9c3;
    color:#854d0e;
}

/* BOTÓN VOLVER */

.volver{
    display:inline-block;
    margin-top:40px;
    padding:14px 28px;
    border-radius:50px;
    background:#0f172a;
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.volver:hover{
    background:#1e293b;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <h2 id="titulo"></h2>
    </div>

    <div class="card">
        <ul class="lista" id="listaMotivos"></ul>
        <a href="index.html" class="volver">← Volver al grupo</a>
    </div>

</div>

<script>

/* 🔥 BASE DE DATOS LOCAL EDITABLE */

const datos = {
    "Juan": [
        {texto:"Exámenes finales", estado:"oracion"},
        {texto:"Salud de su abuelo", estado:"constante"}
    ],
    "María": [
        {texto:"Nuevo La convicción es la firme seguridad, creencia o convencimiento profundo que tiene una persona sobre la verdad de sus pensamientos, valores o sentimientos. Actúa como una guía interna inquebrantable que dirige la conducta, las decisiones y la ética, manteniéndose firme incluso ante dudas o presiones", estado:"activo"},
        {texto:"Decisiones importantes", estado:"oracion"}
    ],
    "Santy": [
        {texto:"Proyecto personal", estado:"activo"},
        {texto:"Dirección espiritual", estado:"constante"}
    ]
};

/* ------------------------------ */

const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

document.getElementById("titulo").innerText = "Motivos de " + nombre;

const lista = document.getElementById("listaMotivos");

if(datos[nombre]){
    datos[nombre].forEach(motivo=>{
        const li = document.createElement("li");

        const texto = document.createElement("span");
        texto.className = "motivo-texto";
        texto.textContent = motivo.texto;

        const badge = document.createElement("span");
        badge.className = "badge " + motivo.estado;

        if(motivo.estado === "activo") badge.textContent = "Activo";
        if(motivo.estado === "oracion") badge.textContent = "En oración";
        if(motivo.estado === "constante") badge.textContent = "Constante";

        li.appendChild(texto);
        li.appendChild(badge);

        lista.appendChild(li);
    });
}else{
    lista.innerHTML = "<li>No hay motivos cargados.</li>";
}

</script>

</body>
</html>
