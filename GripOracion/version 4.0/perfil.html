<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Motivos de Oración</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.content{position:relative;z-index:1;max-width:720px;margin:auto;padding:40px 20px 80px}

/* SELECTOR (cuando no hay ?nombre= en la URL) */
.selector-title{
  font-family:'Lora',serif;font-size:26px;font-weight:600;
  margin-bottom:8px;
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.selector-sub{font-size:15px;color:var(--text-muted);margin-bottom:28px}

/* BUSCADOR EN SELECTOR */
.selector-search{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px;margin-bottom:24px;
}

.selector-search input{
  width:100%;padding:14px 18px;border-radius:50px;
  border:1px solid var(--border);background:rgba(255,255,255,0.05);
  color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;
  outline:none;transition:all 0.25s;min-height:48px;
}

.selector-search input:focus{
  border-color:var(--accent);background:rgba(124,159,255,0.08);
}

.selector-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
}
.sel-btn{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:18px 12px;
  text-align:center;cursor:pointer;transition:all 0.25s;
  font-family:'DM Sans',sans-serif;color:var(--text-muted);
  font-size:14px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.sel-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,159,255,0.06)}
.sel-btn:active{transform:scale(0.97)}
.sel-avatar{
  width:48px;height:48px;border-radius:50%;
  background:#1a2235;
  box-shadow:4px 4px 10px rgba(0,0,0,0.5),-2px -2px 6px rgba(255,255,255,0.04),inset 1px 1px 3px rgba(255,255,255,0.05),inset -2px -2px 5px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;color:rgba(255,255,255,0.8);
}
.sel-btn:hover .sel-avatar{background:rgba(124,159,255,0.15);color:var(--accent)}

/* PERFIL HEADER */
.perfil-header{
  display:flex;align-items:center;gap:20px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 24px;
  margin-bottom:32px;position:relative;overflow:hidden;
}
.perfil-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.perfil-avatar{
  width:70px;height:70px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:600;color:rgba(255,255,255,0.85);
  background:#1a2235;
  box-shadow:
    6px 6px 14px rgba(0,0,0,0.5),
    -4px -4px 10px rgba(255,255,255,0.04),
    inset 2px 2px 5px rgba(255,255,255,0.05),
    inset -3px -3px 7px rgba(0,0,0,0.4);
  flex-shrink:0;
}
.perfil-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.perfil-info h2{font-family:'Lora',serif;font-size:24px;font-weight:600;margin-bottom:4px}
.perfil-info p{font-size:14px;color:var(--text-muted)}

/* SECCIÓN */
.sec-title{
  font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.8px;color:var(--text-muted);margin-bottom:12px;
}
.sep{margin-bottom:32px}

/* MOTIVO ITEM */
.motivo-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:20px;margin-bottom:10px;
  transition:border-color 0.2s;animation:fadeUp 0.3s ease both;
}
.motivo-item:hover{border-color:var(--border-hover)}
.motivo-item.respondido{opacity:0.45}
.motivo-item.respondido .motivo-texto{text-decoration:line-through;color:var(--text-muted)}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.motivo-texto{font-size:16px;line-height:1.6;margin-bottom:12px}
.motivo-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* BOTÓN COPIAR */
.copiar-btn{
  width:100%;padding:15px;border-radius:50px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text-muted);font-size:15px;font-weight:500;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  transition:all 0.25s;min-height:52px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;
}
.copiar-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,159,255,0.06)}
.copiar-btn:active{transform:scale(0.98)}
.copiar-btn.copiado{border-color:rgba(78,204,163,0.4);color:var(--success);background:rgba(78,204,163,0.06)}

/* RESPONSIVE */
@media(max-width:600px){
  .selector-grid{
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  }
}
</style>
</head>
<body>

<div class="content">

  <a href="personas.html" class="back-btn">← Volver a miembros</a>

  <!-- SELECTOR: se muestra si no hay ?nombre= en la URL -->
  <div id="selectorWrapper">
    <p class="selector-title">¿A quién querés ver?</p>
    <p class="selector-sub">Seleccioná una persona para ver sus motivos de oración</p>
    
    <div class="selector-search">
      <input 
        type="search" 
        id="selectorBuscador" 
        placeholder="Buscar persona..." 
        autocomplete="off" 
        autocorrect="off"
        aria-label="Buscar persona para ver motivos">
    </div>
    
    <div class="selector-grid" id="selectorGrid"></div>
  </div>

  <!-- PERFIL: se muestra cuando hay persona seleccionada -->
  <div id="mainContent" style="display:none">

    <div class="perfil-header">
      <div class="perfil-avatar" id="perfilAvatar"></div>
      <div class="perfil-info">
        <h2 id="perfilNombre"></h2>
        <p id="perfilSubtitle"></p>
      </div>
    </div>

    <div class="sep">
      <div class="sec-title">Activos</div>
      <div id="motivosActivos"></div>
    </div>

    <div class="sep">
      <div class="sec-title">Constantes</div>
      <div id="motivosConstantes"></div>
    </div>

    <div class="sep">
      <div class="sec-title">✓ Respondidos</div>
      <div id="motivosRespondidos"></div>
    </div>

    <button class="copiar-btn" id="copiarBtn" onclick="copiarMotivos()" aria-label="Copiar motivos de oración">
      📋 Copiar motivos de oración
    </button>

  </div>

</div>

<script src="datos.js"></script>
<script>

/* ============================================
   DATOS Y CONSTANTES
   ============================================ */

const badgeLabel = { oracion: "En oración", constante: "Constante", activo: "Activo", respondido: "Respondido ✓" };
let nombreActual = "";
let listaFiltrada = personas;

function renderLista(lista, contenedorId) {
  const cont = document.getElementById(contenedorId);
  if (!lista.length) {
    cont.innerHTML = '<div class="empty-state"><div class="emoji">🕊️</div><p>Sin motivos en esta sección</p></div>';
    return;
  }
  cont.innerHTML = lista.map((m, i) =>
    '<div class="motivo-item ' + (m.estado === "respondido" ? "respondido" : "") + '" style="animation-delay:' + (i * 0.06) + 's">' +
      '<div class="motivo-texto">' + m.texto + '</div>' +
      '<div class="motivo-footer">' +
        '<span class="badge ' + m.estado + '">' + (badgeLabel[m.estado] || m.estado) + '</span>' +
      '</div>' +
    '</div>'
  ).join("");
}

function renderPerfil(nombre) {
  nombreActual = nombre;
  const motivosList = obtenerMotivos(nombre);

  document.getElementById("perfilNombre").textContent = nombre;
  document.getElementById("perfilAvatar").textContent = nombre.charAt(0);

  renderLista(motivosList.filter(m => m.estado === "oracion" || m.estado === "activo"), "motivosActivos");
  renderLista(motivosList.filter(m => m.estado === "constante"), "motivosConstantes");
  renderLista(motivosList.filter(m => m.estado === "respondido"), "motivosRespondidos");

  const total = motivosList.filter(m => m.estado !== "respondido").length;
  document.getElementById("perfilSubtitle").textContent =
    total === 0 ? "Sin motivos activos" :
    total === 1 ? "1 motivo de oración" :
    total + " motivos de oración";

  document.getElementById("selectorWrapper").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

function copiarMotivos() {
  const motivosList = obtenerMotivos(nombreActual);
  const noRespondidos = motivosList.filter(m => m.estado !== "respondido");
  if (!noRespondidos.length) { alert("No hay motivos para copiar"); return; }

  const lineas = ["🙏 Motivos de oración de " + nombreActual + ":"];
  const enOracion  = motivosList.filter(m => m.estado === "oracion");
  const activos    = motivosList.filter(m => m.estado === "activo");
  const constantes = motivosList.filter(m => m.estado === "constante");

  if (enOracion.length)  { lineas.push(""); lineas.push("📌 En oración:");  enOracion.forEach(m  => lineas.push("• " + m.texto)); }
  if (activos.length)    { lineas.push(""); lineas.push("✅ Activos:");      activos.forEach(m    => lineas.push("• " + m.texto)); }
  if (constantes.length) { lineas.push(""); lineas.push("🔁 Constantes:");  constantes.forEach(m => lineas.push("• " + m.texto)); }

  navigator.clipboard.writeText(lineas.join("\n"));

  const btn = document.getElementById("copiarBtn");
  btn.textContent = "✓ Copiado";
  btn.classList.add("copiado");
  setTimeout(() => { btn.innerHTML = "📋 Copiar motivos de oración"; btn.classList.remove("copiado"); }, 2500);
}

function renderSelector(lista) {
  document.getElementById("selectorGrid").innerHTML = lista.map(n =>
    '<button class="sel-btn" onclick="renderPerfil(\'' + n + '\')" aria-label="Ver motivos de ' + n + '">' +
      '<div class="sel-avatar">' + n.charAt(0) + '</div>' +
      '<span>' + n + '</span>' +
    '</button>'
  ).join("");
}

/* ============================================
   INIT
   ============================================ */

const params = new URLSearchParams(window.location.search);
const nombreURL = params.get("nombre");

if (nombreURL && buscarPersona(nombreURL)) {
  renderPerfil(nombreURL);
} else {
  // Mostrar selector de persona
  document.getElementById("selectorWrapper").style.display = "block";
  document.getElementById("mainContent").style.display = "none";
  renderSelector(personas);
  
  // Buscador en selector
  document.getElementById("selectorBuscador").addEventListener("input", function(){
    const q = this.value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const filtradas = personas.filter(p =>
      p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(q)
    );
    listaFiltrada = filtradas;
    renderSelector(filtradas);
  });
}

</script>
</body>
</html>
