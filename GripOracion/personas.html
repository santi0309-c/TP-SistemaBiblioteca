<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miembros del Grupo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e293b, #0f172a);
    min-height:100vh;
    color:white;
}

.header{
    text-align:center;
    padding:70px 20px 40px 20px;
}

.header h1{
    font-size:42px;
    font-weight:700;
    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    margin-top:10px;
    opacity:0.7;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px 40px 80px 40px;
}

/* BUSCADOR */

.buscador{
    max-width:500px;
    margin:0 auto 50px auto;
    display:flex;
    justify-content:center;
}

.buscador input{
    width:100%;
    padding:14px 22px;
    border-radius:50px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.07);
    color:white;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

.buscador input:focus{
    border:1px solid #60a5fa;
    box-shadow:0 0 15px rgba(96,165,250,0.5);
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:30px;
}

/* TARJETAS */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:35px 25px;
    text-align:center;
    backdrop-filter:blur(18px);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

.card h3{
    margin-bottom:28px;
    font-size:20px;
    font-weight:600;
}

/* AVATAR */

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    margin:0 auto 20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:600;
    color:white;
    background:#1e293b;
    position:relative;
    box-shadow:
    0 0 0 3px rgba(255,255,255,0.08),
    0 12px 30px rgba(0,0,0,0.45);
    animation:flotar 4s ease-in-out infinite;
    transition:all .35s ease;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.card:hover .avatar{
    transform:scale(1.1) rotate(3deg);
    box-shadow:0 18px 40px rgba(0,0,0,0.55);
}

/* anillo luminoso */

.avatar::before{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background:linear-gradient(120deg,
    rgba(255,255,255,0.4),
    transparent,
    rgba(255,255,255,0.4));
    filter:blur(6px);
    opacity:.35;
    z-index:-1;
}

/* animación hover */

.card:hover .avatar{
    transform:scale(1.08);
    box-shadow:
    0 0 0 3px rgba(255,255,255,0.12),
    0 18px 40px rgba(0,0,0,0.6);
}

/* animación flotante */

@keyframes flotar{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* BOTON */

.btn{
    display:inline-block;
    padding:10px 22px;
    border-radius:40px;
    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    color:white;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

/* VOLVER */

.volver{
    text-align:center;
    margin-top:60px;
}

.volver a{
    padding:12px 28px;
    border-radius:40px;
    background:#1e293b;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.volver a:hover{
    background:#334155;
    transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="header">
    <h1>Miembros del Grupo</h1>
    <p>Buscá una persona para ver sus motivos de oración</p>
</div>

<div class="container">

<div class="buscador">
    <input 
    type="text"
    id="buscador"
    placeholder="🔍 Buscar persona..."
    onkeyup="filtrarPersonas()"
    >
</div>

<div class="grid" id="gridPerfiles"></div>

<div class="volver">

<a href="index.html">← Volver al inicio</a>

</div>
</div>

<script>

/* PERSONAS */

    const personas = [
    {nombre:"Juan", foto:"fotos/juan.png"},
    {nombre:"María", foto:"imagenes/maria.jpg"},
    {nombre:"Santy", foto:"imagenes/santy.jpg"},
    {nombre:"Lucas", foto:""},
    {nombre:"Valentina", foto:""},
    {nombre:"Tomás", foto:""},
    {nombre:"Sofía", foto:""},
    {nombre:"Mateo", foto:""},
    {nombre:"Camila", foto:""},
    {nombre:"Agustín", foto:""},
    {nombre:"Martina", foto:""},
    {nombre:"Franco", foto:""},
    {nombre:"Julieta", foto:""},
    {nombre:"Nicolás", foto:""},
    {nombre:"Micaela", foto:""}
    ];

    const grid = document.getElementById("gridPerfiles");

    /* CREAR TARJETAS */

    personas.forEach(persona => {

        const card = document.createElement("div");
        card.className = "card";

        const avatar = document.createElement("div");
        avatar.className = "avatar";

        if(persona.foto){

        avatar.innerHTML = `<img src="${persona.foto}" alt="${persona.nombre}">`;

        }else{

        const inicial = persona.nombre.charAt(0).toUpperCase()

        avatar.textContent = inicial

    }

    const nombre = document.createElement("h3");
    nombre.textContent = persona.nombre;

    const btn = document.createElement("a");
    btn.className = "btn";
    btn.href = `perfil.html?nombre=${encodeURIComponent(persona.nombre)}`;
    btn.textContent = "Ver motivos";

    card.appendChild(avatar);
    card.appendChild(nombre);
    card.appendChild(btn);

    grid.appendChild(card);

    });

    /* BUSCADOR */

    function filtrarPersonas(){

        const filtro = document
        .getElementById("buscador")
        .value
        .toLowerCase();

        const tarjetas = document.querySelectorAll(".card");

        tarjetas.forEach(card=>{

        const nombre = card
        .querySelector("h3")
        .innerText
        .toLowerCase();

        if(nombre.includes(filtro)){

        card.style.display="block";

        }else{

        card.style.display="none";

            }

        });

    }

</script>

</body>
</html>
